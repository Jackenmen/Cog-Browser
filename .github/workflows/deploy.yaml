name: Build and deploy
on:
  push:
    branches:
      - "master"
  workflow_call:

jobs:
  build:
    name: Build container image
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/cog-creators/cog-browser
          flavor: |
            latest=true
          tags: |
            type=sha

      - name: Login to GitHub Container Registry
        if: github.repository_owner == 'cog-creators'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.repository_owner == 'cog-creators' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    name: Deploy to index.discord.red
    needs: build
    environment: Deployment
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'cog-creators' }}
    steps:
      - name: Trigger deployment.
        env:
          WEBHOOK_DEPLOY_INDEX_TOKEN: ${{ secrets.WEBHOOK_DEPLOY_INDEX_TOKEN }}
          WEBHOOK_DEPLOY_INDEX_URL: ${{ secrets.WEBHOOK_DEPLOY_INDEX_URL }}
        run: >-
          curl -H "X-Token: $WEBHOOK_DEPLOY_INDEX_TOKEN" "$WEBHOOK_DEPLOY_INDEX_URL"
